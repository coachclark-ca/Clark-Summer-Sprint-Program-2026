<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Addison's Summer Program</title>
<style>
  :root {
    --green: #1a6b3c;
    --green-light: #e8f5ee;
    --green-mid: #4caf76;
    --gold: #c8922a;
    --gold-light: #fdf3e3;
    --red: #c0392b;
    --red-light: #fdecea;
    --purple: #5b3d8a;
    --purple-light: #f0eaf8;
    --blue: #1e5fa8;
    --blue-light: #e8f0fb;
    --gray-dark: #1c1c1e;
    --gray-mid: #48484a;
    --gray-soft: #8e8e93;
    --gray-border: #d1d1d6;
    --gray-bg: #f2f2f7;
    --white: #ffffff;
    --radius: 12px;
    --radius-sm: 8px;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: var(--font); background: var(--gray-bg); color: var(--gray-dark); min-height: 100vh; }

  /* HEADER */
  .header {
    background: var(--green);
    color: white;
    padding: 52px 20px 20px;
    position: sticky; top: 0; z-index: 100;
  }
  .header h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.3px; }
  .header p { font-size: 13px; opacity: 0.8; margin-top: 2px; }
  .header-row { display: flex; justify-content: space-between; align-items: flex-end; }
  .progress-pill {
    background: rgba(255,255,255,0.2);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 12px;
    font-weight: 600;
  }

  /* TABS */
  .phase-bar {
    background: var(--white);
    border-bottom: 1px solid var(--gray-border);
    overflow-x: auto;
    white-space: nowrap;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .phase-bar::-webkit-scrollbar { display: none; }
  .phase-tabs { display: inline-flex; padding: 0 12px; }
  .ptab {
    padding: 12px 14px;
    font-size: 13px;
    font-weight: 500;
    color: var(--gray-soft);
    border-bottom: 2px solid transparent;
    cursor: pointer;
    white-space: nowrap;
    background: none;
    border-left: none; border-right: none; border-top: none;
  }
  .ptab.active { color: var(--green); border-bottom-color: var(--green); }

  .week-bar {
    background: var(--white);
    border-bottom: 1px solid var(--gray-border);
    overflow-x: auto; white-space: nowrap;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    padding: 0 12px;
  }
  .week-bar::-webkit-scrollbar { display: none; }
  .wtab {
    display: inline-block;
    padding: 8px 14px;
    font-size: 13px;
    font-weight: 500;
    color: var(--gray-soft);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    background: none;
    border-left: none; border-right: none; border-top: none;
  }
  .wtab.active { color: var(--green); border-bottom-color: var(--green); }

  /* VACATION BANNER */
  .vacation-banner {
    background: var(--gold-light);
    border: 1px solid #e8c56a;
    border-radius: var(--radius);
    padding: 14px 16px;
    margin: 16px 16px 0;
    font-size: 13px;
    color: #7a5500;
    display: flex; gap: 10px; align-items: flex-start;
  }
  .vacation-banner .icon { font-size: 20px; flex-shrink: 0; }

  /* WEEK SUMMARY */
  .week-meta { padding: 16px 16px 0; }
  .week-title { font-size: 20px; font-weight: 700; }
  .week-sub { font-size: 13px; color: var(--gray-soft); margin-top: 3px; }
  .target-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .chip {
    font-size: 11px; font-weight: 600; padding: 4px 10px;
    border-radius: 20px; background: var(--green-light); color: var(--green);
  }
  .chip.exp { background: var(--purple-light); color: var(--purple); }
  .chip.run { background: var(--gold-light); color: var(--gold); }

  /* DAY CARDS */
  .days { padding: 16px; display: flex; flex-direction: column; gap: 12px; }
  .day-card {
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .day-card.rest-card { background: var(--gray-bg); box-shadow: none; border: 1px solid var(--gray-border); }

  .day-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 16px; cursor: pointer;
    user-select: none; -webkit-user-select: none;
  }
  .day-name { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--gray-soft); }
  .day-title { font-size: 15px; font-weight: 600; color: var(--gray-dark); margin-top: 2px; }
  .day-pills { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 5px; }
  .dpill {
    font-size: 10px; font-weight: 600; padding: 2px 7px;
    border-radius: 20px;
  }
  .dpill.str { background: var(--blue-light); color: var(--blue); }
  .dpill.exp { background: var(--purple-light); color: var(--purple); }
  .dpill.run { background: var(--gold-light); color: var(--gold); }
  .dpill.flex { background: var(--green-light); color: var(--green); }
  .dpill.rest { background: var(--gray-bg); color: var(--gray-soft); }
  .dpill.core { background: #f0e8f8; color: #5b2d8a; }

  .chevron { font-size: 18px; color: var(--gray-soft); transition: transform 0.2s; flex-shrink: 0; }
  .day-card.open .chevron { transform: rotate(180deg); }

  .day-body { display: none; padding: 0 16px 16px; }
  .day-card.open .day-body { display: block; }

  /* BLOCKS */
  .block { margin-bottom: 14px; }
  .block:last-child { margin-bottom: 0; }
  .block-title {
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.07em; color: var(--gray-soft);
    padding: 8px 0 6px;
    border-top: 1px solid var(--gray-border);
    margin-top: 4px;
  }

  /* EXERCISE ROWS */
  .ex-row {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 9px 0;
    border-bottom: 1px solid var(--gray-border);
    position: relative;
  }
  .ex-row:last-child { border-bottom: none; }
  .ex-row.crossed .ex-name { text-decoration: line-through; color: var(--gray-soft); }
  .ex-row.crossed .ex-scheme { text-decoration: line-through; color: var(--gray-soft); }
  .ex-row.done .ex-name { color: var(--green); }
  .ex-row.done .checkmark { background: var(--green); color: white; }

  .checkmark {
    width: 24px; height: 24px; border-radius: 50%;
    border: 2px solid var(--gray-border);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; cursor: pointer; flex-shrink: 0;
    transition: all 0.15s;
    margin-top: 1px;
    background: white;
    color: transparent;
  }
  .checkmark:active { transform: scale(0.9); }

  .ex-content { flex: 1; min-width: 0; }
  .ex-name-row { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; }
  .ex-name { font-size: 14px; font-weight: 500; color: var(--gray-dark); flex: 1; }
  .ex-scheme { font-size: 12px; color: var(--gray-soft); white-space: nowrap; text-align: right; }
  .ex-note { font-size: 11px; color: var(--gray-soft); margin-top: 2px; line-height: 1.4; }
  .ex-note.bodyweight { color: var(--green); font-weight: 500; }

  /* EDIT CONTROLS */
  .ex-actions { display: none; gap: 6px; margin-top: 6px; }
  .ex-row.editing .ex-actions { display: flex; }
  .ex-row.editing .ex-name { display: none; }
  .ex-row.editing .ex-scheme { display: none; }
  .ex-row.editing .ex-note { display: none; }
  .ex-edit-inputs { display: none; flex-direction: column; gap: 5px; flex: 1; }
  .ex-row.editing .ex-edit-inputs { display: flex; }
  .edit-input {
    border: 1px solid var(--gray-border); border-radius: 6px;
    padding: 6px 10px; font-size: 13px; width: 100%;
    font-family: var(--font); background: var(--gray-bg);
    color: var(--gray-dark);
  }
  .edit-input:focus { outline: none; border-color: var(--green); background: white; }
  .btn-sm {
    font-size: 12px; font-weight: 600; padding: 6px 12px;
    border-radius: 6px; border: none; cursor: pointer;
  }
  .btn-save { background: var(--green); color: white; }
  .btn-delete { background: var(--red-light); color: var(--red); }
  .btn-cancel { background: var(--gray-bg); color: var(--gray-mid); }

  .edit-toggle {
    font-size: 16px; color: var(--gray-soft); cursor: pointer;
    padding: 2px 4px; border: none; background: none;
    flex-shrink: 0; margin-top: 1px;
  }
  .edit-toggle:active { color: var(--gray-dark); }

  /* ADD EXERCISE */
  .add-ex-btn {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 0; font-size: 13px; color: var(--green);
    font-weight: 600; cursor: pointer; background: none;
    border: none; border-top: 1px dashed var(--gray-border);
    width: 100%; margin-top: 4px;
  }
  .add-ex-form { display: none; flex-direction: column; gap: 8px; padding: 10px 0; }
  .add-ex-form.open { display: flex; }
  .add-row { display: flex; gap: 6px; }

  /* BODYWEIGHT ALTERNATIVES */
  .bw-section {
    background: var(--green-light);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    margin-top: 12px;
  }
  .bw-title { font-size: 12px; font-weight: 700; color: var(--green); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
  .bw-row { font-size: 12px; color: var(--gray-mid); padding: 4px 0; border-bottom: 1px solid rgba(26,107,60,0.15); line-height: 1.5; }
  .bw-row:last-child { border-bottom: none; }
  .bw-row strong { color: var(--green); }

  /* COACH NOTE */
  .coach-note {
    background: var(--gold-light);
    border-left: 3px solid var(--gold);
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    padding: 12px 14px;
    font-size: 12px;
    color: #5a3e00;
    line-height: 1.6;
    margin: 0 16px 20px;
  }
  .coach-note strong { display: block; font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--gold); margin-bottom: 4px; }

  /* PROGRESS BAR */
  .day-progress {
    height: 3px; background: var(--gray-border); border-radius: 3px; margin: 8px 0 0;
  }
  .day-progress-fill { height: 3px; background: var(--green); border-radius: 3px; transition: width 0.3s; }

  /* OVERALL PROGRESS */
  .overall-bar { margin: 10px 16px 0; }
  .overall-bar-track { height: 4px; background: rgba(255,255,255,0.3); border-radius: 4px; }
  .overall-bar-fill { height: 4px; background: white; border-radius: 4px; transition: width 0.5s; }
  .overall-label { font-size: 11px; color: rgba(255,255,255,0.8); margin-top: 4px; }

  /* TOAST */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--gray-dark); color: white;
    padding: 10px 20px; border-radius: 20px;
    font-size: 13px; font-weight: 500;
    transition: transform 0.25s; z-index: 999;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* MODAL */
  .modal-bg {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.45); z-index: 200;
    align-items: flex-end;
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: white; border-radius: 20px 20px 0 0;
    padding: 20px; width: 100%;
    max-height: 80vh; overflow-y: auto;
  }
  .modal h3 { font-size: 17px; font-weight: 700; margin-bottom: 4px; }
  .modal p { font-size: 13px; color: var(--gray-soft); margin-bottom: 16px; }
  .modal-close { float: right; font-size: 22px; cursor: pointer; color: var(--gray-soft); border: none; background: none; }

  @media (min-width: 600px) {
    .days { max-width: 600px; margin: 0 auto; }
    .week-meta { max-width: 600px; margin: 0 auto; }
    .coach-note { max-width: 600px; margin: 0 auto 20px; }
    .vacation-banner { max-width: 600px; margin: 16px auto 0; }
    .overall-bar { max-width: 600px; margin: 10px auto 0; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-row">
    <div>
      <h1>Addison's Summer Strength</h1>
      <p>6-Week Garage Program · Class of 2028</p>
    </div>
    <div class="progress-pill" id="overallPill">0% done</div>
  </div>
  <div class="overall-bar">
    <div class="overall-bar-track"><div class="overall-bar-fill" id="overallFill" style="width:0%"></div></div>
    <div class="overall-label" id="overallLabel">0 of 0 exercises complete</div>
  </div>
</div>

<div class="phase-bar">
  <div class="phase-tabs" id="phaseTabs"></div>
</div>
<div class="week-bar" id="weekBar"></div>

<div id="mainContent"></div>

<div class="toast" id="toast"></div>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">×</button>
    <h3>Bodyweight Alternatives</h3>
    <p>No weights? No problem. Swap any exercise below — works for vacation or any day without the garage.</p>
    <div id="modalContent"></div>
  </div>
</div>

const phases = [
  "Phase 1 — Foundation",
  "Phase 2 — Strength",
  "Phase 3 — Peak Power"
];

const programData = [
// WEEK 1

  days:[
    { name:"Monday", type:"Lift A — Back & Core", pills:["str","core"], blocks:[
      { title:"Warm-Up (10 min)", exs:[

      { title:"Flexibility (20 min)", exs:[

// WEEK 2
{

  customNames: {}, // key => new name
  customSchemes: {},
  addedExs: {},  // key "w-d-b" => [{n,s,note}]
};

function loadState(){
  try { const s = localStorage.getItem('addisonProg'); if(s) state = {...state, ...JSON.parse(s)}; } catch(e){}
}
function saveState(){
  try { localStorage.setItem('addisonProg', JSON.stringify(state)); } catch(e){}
}

function exKey(wi,di,bi,ei){ return `${wi}-${di}-${bi}-${ei}`; }
function blockKey(wi,di,bi){ return `${wi}-${di}-${bi}`; }

// ---- PROGRESS ----
function calcProgress(){
  let total=0, done=0;
  programData.forEach((wk,wi)=>{
    wk.days.forEach((d,di)=>{
      d.blocks.forEach((b,bi)=>{
        b.exs.forEach((e,ei)=>{
          if(e.n === "Complete rest" || e.n.includes("Complete rest")) return;
          total++;
          const k = exKey(wi,di,bi,ei);
          if(state.checked[k]) done++;
        });
        const added = state.addedExs[blockKey(wi,di,bi)] || [];
        added.forEach((_,ai)=>{
          total++;
          const k = exKey(wi,di,bi,`a${ai}`);
          if(state.checked[k]) done++;
        });
      });
    });
  });
  return {total,done};
}

function calcDayProgress(wi,di){
  let total=0, done=0;
  const d = programData[wi].days[di];
  d.blocks.forEach((b,bi)=>{
    b.exs.forEach((e,ei)=>{
      if(e.n.includes("Complete rest")) return;
      total++;
      if(state.checked[exKey(wi,di,bi,ei)]) done++;
    });
    const added = state.addedExs[blockKey(wi,di,bi)] || [];
    added.forEach((_,ai)=>{ total++; if(state.checked[exKey(wi,di,bi,`a${ai}`)]) done++; });
  });
  return {total,done};
}

function updateOverall(){
  const {total,done} = calcProgress();
  const pct = total>0 ? Math.round(done/total*100) : 0;
  document.getElementById('overallPill').textContent = pct+'% done';
  document.getElementById('overallFill').style.width = pct+'%';
  document.getElementById('overallLabel').textContent = `${done} of ${total} exercises complete`;
}

// ---- TOAST ----
let toastTimer;
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'), 2000);
}

// ---- MODAL ----
function openBWModal(){
  const mc = document.getElementById('modalContent');
  mc.innerHTML = Object.entries(BW_ALTS).map(([orig,alt])=>`
    <div style="padding:10px 0; border-bottom:1px solid #eee;">
      <div style="font-size:12px;color:#8e8e93;margin-bottom:3px">Replace:</div>
      <div style="font-size:14px;font-weight:600;color:#1c1c1e;margin-bottom:4px">${orig}</div>
      <div style="font-size:12px;color:#8e8e93">With:</div>
      <div style="font-size:14px;font-weight:500;color:#1a6b3c">${alt.swap}</div>
      <div style="font-size:12px;color:#48484a;margin-top:3px">${alt.note}</div>
    </div>`).join('');
  document.getElementById('modalBg').classList.add('open');
}
function closeModal(){ document.getElementById('modalBg').classList.remove('open'); }
document.getElementById('modalBg').addEventListener('click', function(e){ if(e.target===this) closeModal(); });

// ---- RENDER ----
function render(){
  renderPhaseTabs();
  renderWeekBar();
  renderMain();
  updateOverall();
}

function renderPhaseTabs(){
  const container = document.getElementById('phaseTabs');
  container.innerHTML = phases.map((p,i)=>
    `<button class="ptab${state.phase===i?' active':''}" onclick="setPhase(${i})">${p}</button>`
  ).join('');
}

function getPhaseWeeks(ph){
  return programData.map((w,i)=>({...w,idx:i})).filter(w=>w.phase===ph);
}

function renderWeekBar(){
  const pw = getPhaseWeeks(state.phase);
  document.getElementById('weekBar').innerHTML = pw.map(w=>
    `<button class="wtab${w.idx===state.week?' active':''}" onclick="setWeek(${w.idx})">${w.title}${w.vacation?' 🌴':''}</button>`
  ).join('');
}

function setPhase(p){
  state.phase = p;
  const pw = getPhaseWeeks(p);
  state.week = pw[0].idx;
  saveState(); render();
}
function setWeek(w){ state.week = w; saveState(); render(); }

function renderMain(){
  const wi = state.week;
  const wk = programData[wi];
  let html = '';

  if(wk.vacation){
    html += `<div class="vacation-banner"><span class="icon">🌴</span><div><strong>Vacation Week</strong><br>All exercises are bodyweight or band-only — no gym needed. Focus on consistency, flexibility, and fun.</div></div>`;
  }

  html += `<div class="week-meta">
    <div class="week-title">${wk.title}${wk.vacation?' — Vacation':''}</div>
    <div class="week-sub">${wk.sub}</div>
    <div class="target-chips">${wk.targets.map(t=>`<span class="chip">${t}</span>`).join('')}</div>
    ${wk.vacation?`<div style="margin-top:10px"><button onclick="openBWModal()" style="background:#e8f5ee;color:#1a6b3c;border:none;border-radius:8px;padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer;">📋 View all bodyweight substitutions</button></div>`:''}
  </div>`;

  html += `<div class="days">`;
  wk.days.forEach((d,di)=>{
    const isRest = d.pills.includes('rest');
    const {total,done} = calcDayProgress(wi,di);
    const pct = total>0 ? Math.round(done/total*100) : 0;
    const allDone = total>0 && done===total;

    html += `<div class="day-card${isRest?' rest-card':''}${allDone?' all-done':''}" id="day-${wi}-${di}">
      <div class="day-header" onclick="toggleDay(${wi},${di})">
        <div>
          <div class="day-name">${d.name}${allDone?' ✓':''}</div>
          <div class="day-title">${d.type}</div>
          <div class="day-pills">${d.pills.map(p=>`<span class="dpill ${p}">${p}</span>`).join('')}</div>
          ${!isRest&&total>0?`<div class="day-progress"><div class="day-progress-fill" style="width:${pct}%"></div></div>`:''}
        </div>
        <div class="chevron">⌄</div>
      </div>
      <div class="day-body">`;

    d.blocks.forEach((b,bi)=>{
      html += `<div class="block">
        <div class="block-title">${b.title}</div>`;

      b.exs.forEach((e,ei)=>{
        html += renderExRow(wi,di,bi,ei,e,false);
      });

      // Added exercises
      const added = state.addedExs[blockKey(wi,di,bi)] || [];
      added.forEach((ae,ai)=>{
        html += renderExRow(wi,di,bi,`a${ai}`,ae,true,ai);
      });

      // Add exercise button
      html += `<button class="add-ex-btn" onclick="showAddForm(${wi},${di},${bi})">＋ Add exercise</button>
        <div class="add-ex-form" id="addform-${wi}-${di}-${bi}">
          <input class="edit-input" id="addname-${wi}-${di}-${bi}" placeholder="Exercise name" />
          <input class="edit-input" id="addscheme-${wi}-${di}-${bi}" placeholder="Sets × reps (e.g. 3 × 10)" />
          <input class="edit-input" id="addnote-${wi}-${di}-${bi}" placeholder="Coaching note (optional)" />
          <div class="add-row">
            <button class="btn-sm btn-save" onclick="addExercise(${wi},${di},${bi})">Add</button>
            <button class="btn-sm btn-cancel" onclick="hideAddForm(${wi},${di},${bi})">Cancel</button>
          </div>
        </div>`;

      html += `</div>`;
    });

    html += `</div></div></div>`;
  });

  html += `</div>`;
  html += `<div class="coach-note"><strong>Coach's note</strong>${wk.note}</div>`;

  document.getElementById('mainContent').innerHTML = html;
}

function renderExRow(wi,di,bi,ei,e,isAdded,addedIdx){
  const k = exKey(wi,di,bi,ei);
  const isChecked = !!state.checked[k];
  const isCrossed = !!state.crossed[k];
  const isRest = e.n.includes("Complete rest");
  const hasBW = BW_ALTS[e.n];
  const dispName = state.customNames[k] || e.n;
  const dispScheme = state.customSchemes[k] || e.s;

  let cls = 'ex-row';
  if(isCrossed) cls += ' crossed';
  if(isChecked) cls += ' done';

  const deleteBtn = isAdded
    ? `<button class="btn-sm btn-delete" onclick="deleteAdded(${wi},${di},${bi},${addedIdx})">Delete</button>`
    : `<button class="btn-sm btn-delete" onclick="crossOut(${wi},${di},${bi},'${ei}')">Cross out</button>`;

  return `<div class="${cls}" id="exrow-${k}">
    ${!isRest?`<div class="checkmark" onclick="toggleCheck('${k}')">${isChecked?'✓':''}</div>`:'<div style="width:24px;flex-shrink:0"></div>'}
    <div class="ex-content">
      <div class="ex-name-row">
        <span class="ex-name">${dispName}</span>
        <span class="ex-scheme">${dispScheme}</span>
        ${!isRest?`<button class="edit-toggle" onclick="toggleEdit('${k}',${wi},${di},${bi},'${ei}',${isAdded?1:0},${addedIdx!==undefined?addedIdx:-1})" title="Edit">✏️</button>`:''}
      </div>
      ${e.note?`<div class="ex-note">${e.note}</div>`:''}
      ${hasBW&&!isCrossed?`<div class="ex-note bodyweight">💪 BW swap: ${BW_ALTS[e.n].swap}</div>`:''}
      <div class="ex-edit-inputs" id="editinputs-${k}">
        <input class="edit-input" id="editname-${k}" value="${dispName}" placeholder="Exercise name"/>
        <input class="edit-input" id="editscheme-${k}" value="${dispScheme}" placeholder="Sets × reps"/>
        <input class="edit-input" id="editnote-${k}" value="${e.note||''}" placeholder="Coaching note"/>
      </div>
      <div class="ex-actions" id="exactions-${k}">
        <button class="btn-sm btn-save" onclick="saveEdit('${k}',${wi},${di},${bi},'${ei}',${isAdded?1:0},${addedIdx!==undefined?addedIdx:-1})">Save</button>
        ${deleteBtn}
        <button class="btn-sm btn-cancel" onclick="cancelEdit('${k}')">Cancel</button>
      </div>
    </div>
  </div>`;
}

// ---- INTERACTIONS ----
function toggleDay(wi,di){
  const card = document.getElementById(`day-${wi}-${di}`);
  card.classList.toggle('open');
}

function toggleCheck(k){
  state.checked[k] = !state.checked[k];
  saveState();
  if(state.checked[k]) showToast('Exercise done ✓');
  render();
}

function crossOut(wi,di,bi,ei){
  const k = exKey(wi,di,bi,ei);
  state.crossed[k] = !state.crossed[k];
  if(state.crossed[k]) state.checked[k] = false;
  saveState(); render();
  showToast(state.crossed[k] ? 'Exercise crossed out — add a replacement below' : 'Restored');
}

function toggleEdit(k,wi,di,bi,ei,isAdded,addedIdx){
  const row = document.getElementById(`exrow-${k}`);
  row.classList.toggle('editing');
}

function cancelEdit(k){
  const row = document.getElementById(`exrow-${k}`);
  row.classList.remove('editing');
}

function saveEdit(k,wi,di,bi,ei,isAdded,addedIdx){
  const newName = document.getElementById(`editname-${k}`).value.trim();
  const newScheme = document.getElementById(`editscheme-${k}`).value.trim();
  const newNote = document.getElementById(`editnote-${k}`).value.trim();
  if(!newName) return;
  if(isAdded && addedIdx>=0){
    const bk = blockKey(wi,di,bi);
    if(state.addedExs[bk] && state.addedExs[bk][addedIdx]){
      state.addedExs[bk][addedIdx] = {n:newName,s:newScheme,note:newNote};
    }
  } else {
    state.customNames[k] = newName;
    state.customSchemes[k] = newScheme;
  }
  saveState(); render(); showToast('Exercise updated');
}

function deleteAdded(wi,di,bi,ai){
  const bk = blockKey(wi,di,bi);
  if(state.addedExs[bk]) state.addedExs[bk].splice(ai,1);
  saveState(); render(); showToast('Exercise removed');
}

function showAddForm(wi,di,bi){
  const f = document.getElementById(`addform-${wi}-${di}-${bi}`);
  f.classList.toggle('open');
}
function hideAddForm(wi,di,bi){
  document.getElementById(`addform-${wi}-${di}-${bi}`).classList.remove('open');
}
function addExercise(wi,di,bi){
  const n = document.getElementById(`addname-${wi}-${di}-${bi}`).value.trim();
  const s = document.getElementById(`addscheme-${wi}-${di}-${bi}`).value.trim();
  const note = document.getElementById(`addnote-${wi}-${di}-${bi}`).value.trim();
  if(!n) return;
  const bk = blockKey(wi,di,bi);
  if(!state.addedExs[bk]) state.addedExs[bk] = [];
  state.addedExs[bk].push({n,s,note});
  saveState(); render(); showToast('Exercise added');
}

// ---- INIT ----
loadState();
render();
</script>
</body>
</html>
